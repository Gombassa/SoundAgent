# SoundAgent configuration
# Copy this file to config.yaml and fill in your values.

library_root: D:\SoundLibrary
basehead_import_path: D:\SoundLibrary   # Basehead watches this whole folder tree

tick_interval: 300        # seconds — used by Cowork to schedule the next tick
log_level: INFO

# ── Audio analysis (P7) ──────────────────────────────────────────────────────
audio_analysis:
  enabled: true

  # Files longer than this (seconds) skip Whisper and Essentia; YAMNet/AudioCLIP
  # analyse only the first truncate_waveform_s seconds instead.
  max_analysis_duration_s: 120
  truncate_waveform_s: 60

  # YAMNet content-type thresholds (0–1 summed class scores)
  speech_threshold: 0.4
  music_threshold: 0.3

  # Whisper model: tiny | base | small | medium | large
  whisper_model: base

  # AudioCLIP weights (Partial-Training variant, ~512 MB — already at this path)
  audioclip_weights_path: models/audioclip/AudioCLIP-Partial-Training.pt

  # Tag vocabulary — flat YAML of category → [tags], embedded at startup
  tag_vocabulary_path: config/tag_vocabulary.yaml

  # Maximum tags returned per file (top-N after threshold filter)
  audioclip_max_tags: 15

  # YAMNet: number of top sound classes sent to Claude
  yamnet_top_n: 5

  # AudioCLIP score threshold; only matches above this are stored
  audioclip_threshold: 0.2

  # AudioCLIP: max matches sent to Claude (top N by score after threshold filter)
  audioclip_top_n: 5

  # Set true to re-run audio analysis on files that were enriched before P7
  run_on_existing: false

duplicate_detection:
  enabled: true
  fpcalc_path: tools/fpcalc.exe          # path to fpcalc binary; "fpcalc" if on PATH
  fingerprint_similarity_threshold: 0.85  # 0.0–1.0; lower = more aggressive matching

sources:

  # ── Main drop folder — files placed here are picked up each tick ─────────────
  - name: inbox
    type: local
    path: D:\SoundLibrary_Inbox
    enabled: true

# SoundAgent configuration
# Copy this file to config.yaml and fill in your values.

library_root: D:\SoundAgent
basehead_import_path: D:\SoundAgent   # Basehead watches this whole folder tree;
                                       # set to a different path if you want a
                                       # separate Basehead hot-drop folder

tick_interval: 300        # seconds — used by Cowork to schedule the next tick
log_level: INFO

# ── Audio analysis (P7) ──────────────────────────────────────────────────────
audio_analysis:
  enabled: true

  # Files longer than this (seconds) skip Whisper and Essentia; YAMNet/AudioCLIP
  # analyse only the first truncate_waveform_s seconds instead.
  max_analysis_duration_s: 120
  truncate_waveform_s: 60

  # YAMNet content-type thresholds (0–1 summed class scores)
  speech_threshold: 0.4
  music_threshold: 0.3

  # Whisper model: tiny | base | small | medium | large
  whisper_model: base

  # AudioCLIP weights — download manually, ~800 MB
  # See README for download instructions
  audioclip_weights_path: models/audioclip/AudioCLIP.pt

  # AudioCLIP score threshold; only matches above this are stored
  audioclip_threshold: 0.2

  # Set true to re-run audio analysis on files that were enriched before P7
  run_on_existing: false

sources:

  # ── Local / existing libraries ──────────────────────────────────────────────
  - name: field-recordings-d
    type: local
    path: D:\Field Recordings
    enabled: true

  - name: field-recordings-c
    type: local
    path: C:\Users\robin\Music\Field Recordings
    enabled: true

  # ── Google Drive (via Google Drive for Desktop — mounts as G:\) ─────────────
  - name: gdrive-field-recordings
    type: local
    path: G:\My Drive\Field recordings
    enabled: false

  - name: gdrive-to-sort
    type: local
    path: G:\My Drive\To sort
    enabled: false

  # ── rclone (alternative Google Drive — also works for any cloud provider) ───
  - name: gdrive-rclone
    type: rclone
    remote: gdrive             # name of your configured rclone remote
    remote_path: /
    mode: sync
    interval: 60
    enabled: false

  # ── Mobile ingest via WebDAV ─────────────────────────────────────────────────
  # Start with: python -m soundagent webdav start
  # iOS: Files → Browse → ··· → Connect to Server → http://<machine-ip>:8080
  - name: mobile-webdav
    type: webdav
    port: 8080
    auth: true
    username: soundagent
    # password: set SOUNDAGENT_WEBDAV_PASSWORD env var
    enabled: false

# SoundAgent configuration
# Copy this file to config.yaml and fill in your values.

library_root: D:\SoundAgent
basehead_import_path: D:\SoundAgent   # Basehead watches this whole folder tree;
                                       # set to a different path if you want a
                                       # separate Basehead hot-drop folder

tick_interval: 300        # seconds — used by Cowork to schedule the next tick
log_level: INFO

sources:

  # ── Local / existing libraries ──────────────────────────────────────────────
  - name: field-recordings-d
    type: local
    path: D:\Field Recordings
    enabled: true

  - name: field-recordings-c
    type: local
    path: C:\Users\robin\Music\Field Recordings
    enabled: true

  # ── Google Drive (via Google Drive for Desktop — mounts as G:\) ─────────────
  - name: gdrive-field-recordings
    type: local
    path: G:\My Drive\Field recordings
    enabled: false

  - name: gdrive-to-sort
    type: local
    path: G:\My Drive\To sort
    enabled: false

  # ── rclone (alternative Google Drive — also works for any cloud provider) ───
  - name: gdrive-rclone
    type: rclone
    remote: gdrive             # name of your configured rclone remote
    remote_path: /
    mode: sync
    interval: 60
    enabled: false

  # ── Mobile ingest via WebDAV ─────────────────────────────────────────────────
  # Start with: python -m soundagent webdav start
  # iOS: Files → Browse → ··· → Connect to Server → http://<machine-ip>:8080
  - name: mobile-webdav
    type: webdav
    port: 8080
    auth: true
    username: soundagent
    # password: set SOUNDAGENT_WEBDAV_PASSWORD env var
    enabled: false
